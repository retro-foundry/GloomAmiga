; Gloom PC / DOS display options.
; Command-line --resolution/--window-size/--boot-resolution still override this file.

; Match the default DOS low mode.
resolution=320x200

; Optional Amiga-style reduced gameplay viewport, centered inside the screen.
; The original Amiga game menu's newwsize/largewin path cycles the chunky
; gameplay view from small windows up to 320x224 and then centers it.
; Examples:
;   viewport_size=160x100
;   viewport_pixel_size=2x2
;   viewport_size=96x80
;   viewport_pixel_size=1x1
;
; Leave these commented for the normal full-screen DOS viewport.
;viewport_size=160x100
;viewport_pixel_size=2x2

; Keyboard bindings can also be changed here. Use comma-separated keys for
; alternate keys on the same action. Supported key names include letters,
; digits, Up, Down, Left, Right, Space, Enter, Escape, Tab, Backspace,
; Left Ctrl, Right Ctrl, Left Shift, Right Shift, Left Alt, and Right Alt.
;
; DOS control-source selection is read from this file instead of the menu.
; Valid values are Keyboard, Joystick1, and Joystick2.
;player1_control=Keyboard
;player2_control=Joystick1
;
; Defaults:
;p1_forward=W,Up
;p1_back=S,Down
;p1_strafe_left=A
;p1_strafe_right=D
;p1_turn_left=Left,Q
;p1_turn_right=Right,E
;p1_fire=Space,Left Ctrl,Right Ctrl
;
;p2_forward=I
;p2_back=K
;p2_strafe_left=U
;p2_strafe_right=O
;p2_turn_left=J
;p2_turn_right=L
;p2_fire=Enter,Right Ctrl
