; Gloom PC / DOS display options.
; Command-line --resolution/--window-size/--boot-resolution still override this file.

; Desktop/web renderer backend. Command-line --renderer overrides this value.
; Valid values are auto, opengl, and software.
; auto prefers OpenGL/WebGL on desktop/web and uses software on DOS.
renderer=auto

; Start native desktop builds in fullscreen-desktop mode.
; Web builds still require a user F11/browser gesture, and DOS uses its own
; indexed display setup.
fullscreen=false

; Match the default low-resolution software framebuffer.
resolution=320x200

; OpenGL/WebGL logical hardware render target.
; Used when renderer=auto chooses hardware or renderer=opengl is requested.
hardware_resolution=1920x1080

; OpenGL/WebGL world shading keeps the original quantized 16-band Amiga depth
; palettes by default. Set true for optional continuous hardware shading.
; The desktop/web pause menu exposes the same option as SMOOTH SHADING.
hardware_smooth_shading=true

; Optional Amiga-style reduced gameplay viewport, centered inside the screen.
; The original Amiga game menu's newwsize/largewin path cycles the chunky
; gameplay view from small windows up to 320x224 and then centers it.
; Examples:
;   viewport_size=160x100
;   viewport_pixel_size=2x2
;   viewport_size=96x80
;   viewport_pixel_size=1x1
;
; Leave these commented for the normal full-screen DOS viewport.
;viewport_size=160x100
;viewport_pixel_size=2x2

; Optional Windows HD presentation art exported/upscaled from tools/extract_amiga_art.py.
; Covers walls, flats, sprites, weapon art, menu/screen artwork, and fonts.
; HD art packs may be partial; missing replacements fall back to original SD assets.
; The path may point either at the directory containing art\ or at the art\ directory itself.
; Command-line --hd-art overrides this value.
; When HD art is loaded, press F10 during gameplay or use the pause menu's
; HD TEXTURES item to switch it on/off at runtime.
;hd_art_path=D:\art-HD-v1

; Keyboard bindings can also be changed here. Use comma-separated keys for
; alternate keys on the same action. Supported key names include letters,
; digits, Up, Down, Left, Right, Space, Enter, Escape, Tab, Backspace,
; Left Ctrl, Right Ctrl, Left Shift, Right Shift, Left Alt, and Right Alt.
;
; DOS control-source selection is read from this file instead of the menu.
; Valid values are Keyboard, Joystick1, and Joystick2.
;player1_control=Keyboard
;player2_control=Joystick1
;
; Defaults:
;p1_forward=W,Up
;p1_back=S,Down
;p1_strafe_left=A
;p1_strafe_right=D
;p1_turn_left=Left,Q
;p1_turn_right=Right,E
;p1_fire=Space,Left Ctrl,Right Ctrl
;
;p2_forward=I
;p2_back=K
;p2_strafe_left=U
;p2_strafe_right=O
;p2_turn_left=J
;p2_turn_right=L
;p2_fire=Enter,Right Ctrl
