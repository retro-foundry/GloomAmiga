name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            config: Release
          - platform: dos
            os: windows-latest
            config: Release

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure CMake
        if: matrix.platform == 'windows'
        run: cmake -S . -B build -A x64

      - name: Build
        if: matrix.platform != 'dos'
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Run self-tests
        if: matrix.platform != 'dos'
        run: python scripts/run_selftests.py --build-dir build --config ${{ matrix.config }}

      - name: Verify Windows runtime assets
        if: matrix.platform == 'windows'
        shell: pwsh
        run: scripts/verify_runtime_assets.ps1 -RuntimeDir build\${{ matrix.config }} -Platform windows

      - name: Set up DOS build dependencies
        if: matrix.platform == 'dos'
        shell: pwsh
        run: scripts/setup_dos_build.ps1

      - name: Build DOS binary
        if: matrix.platform == 'dos'
        shell: pwsh
        run: tools/build_dos.ps1

      - name: Verify DOS output
        if: matrix.platform == 'dos'
        shell: pwsh
        run: |
          if (-not (Test-Path build\dos\GLOOMPC.EXE)) { throw "Missing DOS executable" }
          if (-not (Test-Path build\dos\CWSDPMI.EXE)) { throw "Missing CWSDPMI.EXE" }
          if (-not (Test-Path build\dos\GLOOM.INI)) { throw "Missing DOS INI" }
          scripts/verify_runtime_assets.ps1 -RuntimeDir build\dos -Platform dos
