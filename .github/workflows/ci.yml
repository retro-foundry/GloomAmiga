name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            config: Release
          - platform: windows
            os: windows-latest
            config: Release
          - platform: macos
            os: macos-latest
            config: Release

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            libasound2-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libibus-1.0-dev \
            libpulse-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev

      - name: Configure CMake
        if: runner.os != 'Windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Configure CMake
        if: runner.os == 'Windows'
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Run self-tests
        run: python scripts/run_selftests.py --build-dir build --config ${{ matrix.config }}
